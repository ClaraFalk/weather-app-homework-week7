<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather app</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="weather-container">
      <header>
        <form class="search-bar" id="search-bar">
          <input
            class="search-bar-input"
            id="search-bar-input"
            type="search"
            placeholder="Enter a city..."
            required
          />
          <input class="search-bar-button" type="submit" value="Search" />
        </form>
      </header>

      <main>
        <div class="weather-details">
          <div>
            <h1 class="city-heading" id="city-heading"></h1>
            <p class="weather-information-day">
              <span id="time"></span>, <span id="weather-condition"></span>
              <br />
              Humidity: <strong id="humidity"></strong>, Wind:
              <strong id="wind">1.03km/h</strong>
            </p>
          </div>

          <div class="temperature">
            <div id="icon"></div>
            <div class="degree" id="degree"></div>
            <div class="degree-unit">°C</div>
          </div>
        </div>

        <div class="weather-forecast-row" id="forecast"></div>
      </main>

      <footer>
        <p>
          This project was coded by
          <a href="https://github.com/ClaraFalk" target="_blank">Clara Falk</a>,
          is open-sourced on
          <a
            href="https://github.com/ClaraFalk/weather-app-homework-week7"
            target="_blank"
            >GitHub</a
          >
          and hosted on
          <a
            href="https://weather-app-homework-week7.netlify.app/"
            target="_blank"
            >Netlify</a
          >.
        </p>
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
